<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; }
        .container { width: 400px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);}
        input, select { width: 100%; padding: 8px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 10px; width: 100%; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;}
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center;">User Registration</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p style="text-align:center; margin-top:10px;">
        <a href="{% url 'users_list' %}">View All Users</a>
    </p>
</div>
</body>
</html>
