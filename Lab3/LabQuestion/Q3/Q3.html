<!-- Build a Dynamic Table that adds and deletes rows. -->

<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Table</title>
  <link rel="stylesheet" href="Q3.css">
</head>
<body>
  <div class="container">
    <h2>Dynamic Table</h2>
    <input type="text" id="nameInput" placeholder="Name">
    <input type="number" id="ageInput" placeholder="Age">
    <button id="addBtn">Add Row</button>

    <table id="dynamicTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
         <!-- Rows will be added dynamically here -->
      </tbody>
    </table>
  </div>

  <script src="Q3.js"></script>
</body>
</html>
