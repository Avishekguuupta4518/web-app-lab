<!DOCTYPE html>
<html lang="en">
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Password Show / Hide Toggle</title>
  <link rel="stylesheet" href="Q5.css">
</head>
<body>
  <div class="container">
    <h2>Password Show / Hide Toggle</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button id="toggleBtn">
      <img id="toggleIcon" src="hidden.png" alt="Toggle Icon" width="20">
    </button>
    <p id="status"><strong>Password is Hidden</strong></p>
  </div>

  <script src="Q5.js"></script>
</body>
</html>
