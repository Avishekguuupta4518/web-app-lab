<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light Bulb Toggle</title>
  <link rel="stylesheet" href="Q4.css">
</head>
<body>
  <div class="container">
    <h2>Light Bulb Toggle</h2>
    
    <!-- Bulb image -->
    <img id="bulb" src="light1.jpg" alt="Light Bulb" width="150">

    <!-- Toggle button -->
    <button id="toggleBtn">Turn ON</button>

    <!-- Status message -->
    <p id="status"><strong>The bulb is OFF</strong></p>
  </div>

  <script src="Q4.js"></script>
</body>
</html>
