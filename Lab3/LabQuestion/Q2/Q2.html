<!-- Create a registration form with the following fields: username, email, role (dropdown: Student or Teacher), password, confirm password,  full name, email, password, age, gender, course and acceptance of terms and conditions. Validate the form according to these rules:
Email must match the role:
If Student → email must end with @student.edu.np
If Teacher → email must end with @tutor.edu.np
Confirm Password must match Password.
Highlight invalid inputs with a red border and show error messages. Prevent form submission if any validation fails.
 -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="Q2.css">
</head>
<body>
    <h2>Registration Form</h2>

  <form id="registrationForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" required>
      <div class="error" id="usernameError">Username is required.</div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" required>
      <div class="error" id="fullnameError">Full name is required.</div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
      <div class="error" id="emailError">Invalid email for the selected role.</div>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role" required>
        <option value="">Select role</option>
        <option value="Student">Student</option>
        <option value="Teacher">Teacher</option>
      </select>
      <div class="error" id="roleError">Role is required.</div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
      <div class="error" id="passwordError">Password is required.</div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
      <div class="error" id="confirmPasswordError">Passwords do not match.</div>
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" id="age" required>
      <div class="error" id="ageError">Age is required.</div>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select id="gender" required>
        <option value="">Select gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
      <div class="error" id="genderError">Gender is required.</div>
    </div>

    <div class="form-group">
      <label>Course</label>
      <input type="text" id="course" required>
      <div class="error" id="courseError">Course is required.</div>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="terms"> Accept Terms and Conditions
      </label>
      <div class="error" id="termsError">You must accept the terms.</div>
    </div>

    <button type="submit">Register</button>
  </form>
  <script src="Q2.js"></script>
</body>
</html>
