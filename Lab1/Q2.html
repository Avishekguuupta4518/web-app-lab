<!-- Create a webpage that includes at least two hyperlinks using the <a> tag. One link should open in the same tab and the other should open in a new tab. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>    <!-- Main heading -->
    <h1>Hyperlink Demonstration Using &lt;a&gt; Tag</h1>

    <!-- Link that opens in the same tab (default behavior) -->
    <p>
        Visit 
        <a href="https://www.wikipedia.org">
            Wikipedia
        </a>
        to explore free knowledge.  
        (This link opens in the same tab.)
    </p>

    <!-- Link that opens in a new tab -->
    <p>
        Visit 
        <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">
            Google
        </a>
        for searching the web.  
        (This link opens in a new tab.)
    </p>
    

    <!-- End of content -->
    
</body>
</html>
