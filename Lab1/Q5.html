<!-- Create a webpage using HTML only that displays student
information in a tabular format. Use the <table>, <tr>, <th>, and
<td> tags to design the table with appropriate headings and rows.
Include at least three rows of data and use attributes such as
border, cellpadding, and cellspacing to improve table readability.
Ensure the table is properly structured and easy to understand. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Table</title>
</head>
<body>
    <h1>Student Information</h1>

    <!-- Student table starts -->
    <table border="1" cellpadding="10" cellspacing="0">

        <!-- Table heading row -->
        <tr>
            <th>Student ID</th>
            <th>Full Name</th>
            <th>Course</th>
            <th>Age</th>
            <th>Email</th>
        </tr>

        <!-- First student row -->
        <tr>
            <td>101</td>
            <td>Avishek Gupta</td>
            <td>Computer Engineering</td>
            <td>20</td>
            <td>avishek@example.com</td>
        </tr>

        <!-- Second student row -->
        <tr>
            <td>102</td>
            <td>Rohit Sharma</td>
            <td>Electrical Engineering</td>
            <td>21</td>
            <td>rohit@example.com</td>
        </tr>

        <!-- Third student row -->
        <tr>
            <td>103</td>
            <td>Priya Singh</td>
            <td>Civil Engineering</td>
            <td>19</td>
            <td>priya@example.com</td>
        </tr>

    </table>
    <!-- Student table ends -->
</body>
</html>
