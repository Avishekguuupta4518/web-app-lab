<!-- Design a responsive webpage layout using CSS Flexbox. Create a container with multiple items and apply flexbox properties such as flex-direction, justify-content, align-items and flex-wrap. Demonstrate the use of flex-grow, flex-shrink, and flex-basis on flex items. Use flexbox to design a navigation bar and a card-style layout that adjusts properly on different screen sizes. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Q4.css">
    <title>CSS Flexbox Responsive Layout</title>
</head>
<body>

<!--  NAVIGATION BAR  -->
<nav class="navbar">
    <div class="logo">MyWebsite</div>

    <!-- Navigation menu -->
    <ul class="nav-links">
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
    </ul>
</nav>

<!--  FLEX CONTAINER DEMO  -->
<h1>Flexbox Properties Demonstration</h1>

<div class="flex-container">
    <div class="flex-item item1">Item 1</div>
    <div class="flex-item item2">Item 2</div>
    <div class="flex-item item3">Item 3</div>
    <div class="flex-item item4">Item 4</div>
</div>

<!--  CARD LAYOUT  -->
<h2>Responsive Card Layout</h2>

<div class="card-container">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
</div>



</body>
</html>
