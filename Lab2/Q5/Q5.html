<!-- Design a webpage layout using CSS Grid. Create a grid-based structure that includes a header, sidebar, main content area, and footer. Use grid-template-rows, grid-template-columns, gap, grid-row, and grid-column properties to arrange the layout. Ensure the grid layout is clean, well-structured, and responsive. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout Demo</title>
    <!-- Link external CSS file -->
    <link rel="stylesheet" href="Q5.css">
</head>
<body>

<!-- Main grid container -->
<div class="grid-container">

    <!-- Header section -->
    <header class="header">
        Header
    </header>

    <!-- Sidebar section -->
    <aside class="sidebar">
        Sidebar
    </aside>

    <!-- Main content section -->
    <main class="main">
        Main Content Area
    </main>

    <!-- Footer section -->
    <footer class="footer">
        Footer
    </footer>

</div>

</body>
</html>
