<!-- Create a webpage that demonstrates advanced CSS features. Use pseudo-classes such as hover, focus, and active, and pseudo-elements such as before and after. Apply CSS transitions, transforms, and animations using keyframes. Use CSS variables to define common colors and apply media queries to make the webpage responsive for different screen sizes.
 -->

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS Demo</title>
    <!-- Link external CSS -->
    <link rel="stylesheet" href="Q6.css">
</head>
<body>

<h1>Advanced CSS Features</h1>

<!-- Button to demonstrate pseudo-classes and transitions -->
<button class="btn">Hover Me</button>

<!-- Input field to demonstrate :focus -->
<input type="text" placeholder="Focus on me" class="input-box">

<!-- Card to demonstrate pseudo-elements and transforms -->
<div class="card">
    <h2>CSS Card</h2>
    <p>This card uses ::before and ::after</p>
</div>

<!-- Animated box using keyframes -->
<div class="animation-box"></div>

</body>
</html>
